# ========================================================
# 限位挡块资产登记系统 - 后端配置
# Docker 容器内通过环境变量覆盖此文件配置
# 本地开发时端口与 .env 中 BACKEND_PORT / MYSQL_PORT / REDIS_PORT 保持一致
# ========================================================

server:
  port: 19120

spring:
  application:
    name: stopper-asset

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 本地开发：端口与 .env MYSQL_PORT 一致（33120）
    url: jdbc:mysql://127.0.0.1:33120/stopper_asset?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: stopper_asset_2024

  data:
    redis:
      # 本地开发：端口与 .env REDIS_PORT 一致（63120）
      host: 127.0.0.1
      port: 63120
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.stopper.asset.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
